<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vizuara Admin Chatbot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
    height: 100vh;
    display: flex;
    background: #f0f2f5;
    color: #1a1a1a;
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 260px;
    background: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    flex-direction: column;
    padding: 16px;
    flex-shrink: 0;
  }
  .sidebar h1 { font-size: 18px; margin-bottom: 4px; color: #fff; }
  .sidebar .subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
  .new-chat-btn {
    padding: 10px 14px;
    background: #313244;
    border: 1px solid #45475a;
    border-radius: 8px;
    color: #cdd6f4;
    cursor: pointer;
    font-size: 14px;
    text-align: left;
    transition: background 0.15s;
  }
  .new-chat-btn:hover { background: #45475a; }
  .sidebar-spacer { flex: 1; }
  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #888;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f38ba8;
  }
  .status-dot.connected { background: #a6e3a1; }

  /* ---- Main area ---- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ---- Messages ---- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 720px;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg a { color: inherit; }
  .msg.user {
    align-self: flex-end;
    background: #3b82f6;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #fff;
    color: #1a1a1a;
    border: 1px solid #e2e8f0;
    border-bottom-left-radius: 4px;
  }
  .msg.assistant code {
    background: #f1f5f9;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 13px;
  }
  .msg.assistant pre {
    background: #f1f5f9;
    padding: 10px 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .msg.assistant pre code { background: none; padding: 0; }
  .msg.error {
    align-self: center;
    background: #fef2f2;
    color: #b91c1c;
    border: 1px solid #fecaca;
    font-size: 13px;
  }

  /* ---- Typing indicator ---- */
  .typing {
    align-self: flex-start;
    display: none;
    gap: 4px;
    padding: 12px 18px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
  }
  .typing.visible { display: flex; }
  .typing span {
    width: 8px; height: 8px;
    background: #94a3b8;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ---- Input area ---- */
  .input-area {
    padding: 12px 16px 16px;
    background: #fff;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 100%;
  }
  .input-area textarea {
    flex: 1;
    resize: none;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.4;
    max-height: 140px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-area textarea:focus { border-color: #3b82f6; }
  .send-btn {
    padding: 10px 20px;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .send-btn:hover { background: #2563eb; }
  .send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

  /* ---- Welcome ---- */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: #64748b;
    gap: 8px;
  }
  .welcome h2 { font-size: 22px; color: #334155; }
  .welcome p { font-size: 14px; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <h1>Vizuara Admin</h1>
  <div class="subtitle">AI Chatbot</div>
  <button class="new-chat-btn" onclick="resetChat()">+ New Chat</button>
  <div class="sidebar-spacer"></div>
  <div class="status-indicator">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
</aside>

<!-- Main chat -->
<main class="main">
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>Vizuara Admin Assistant</h2>
      <p>Ask me to create courses, manage enrollments, search users, and more.</p>
    </div>
  </div>

  <div class="typing" id="typing"><span></span><span></span><span></span></div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Type a message..." autofocus></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</main>

<script>
  const messagesEl = document.getElementById("messages");
  const typingEl   = document.getElementById("typing");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("sendBtn");
  const welcomeEl  = document.getElementById("welcome");
  const statusDot  = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");

  let sessionId = null;
  let busy = false;

  // --- Health check ---
  async function checkHealth() {
    try {
      const res = await fetch("/api/health");
      const data = await res.json();
      const ok = data.status === "connected";
      statusDot.classList.toggle("connected", ok);
      statusText.textContent = ok ? `Connected (${data.tools} tools)` : "Disconnected";
    } catch {
      statusDot.classList.remove("connected");
      statusText.textContent = "Server offline";
    }
  }
  checkHealth();
  setInterval(checkHealth, 30000);

  // --- Auto-resize textarea ---
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  // --- Enter to send ---
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // --- Simple markdown rendering ---
  function renderMarkdown(text) {
    return text
      // code blocks
      .replace(/```(\w*)\n([\s\S]*?)```/g, "<pre><code>$2</code></pre>")
      // inline code
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      // bold
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      // italic
      .replace(/\*(.+?)\*/g, "<em>$1</em>")
      // links
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  }

  function addMessage(role, text) {
    if (welcomeEl) welcomeEl.remove();
    const div = document.createElement("div");
    div.className = "msg " + role;
    if (role === "assistant") {
      div.innerHTML = renderMarkdown(text);
    } else {
      div.textContent = text;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // --- Send ---
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    addMessage("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";
    typingEl.classList.add("visible");
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, sessionId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Server error");
      sessionId = data.sessionId;
      addMessage("assistant", data.reply);
    } catch (err) {
      addMessage("error", "Error: " + err.message);
    } finally {
      typingEl.classList.remove("visible");
      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // --- Reset ---
  async function resetChat() {
    if (sessionId) {
      fetch("/api/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId }),
      }).catch(() => {});
    }
    sessionId = null;
    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <h2>Vizuara Admin Assistant</h2>
        <p>Ask me to create courses, manage enrollments, search users, and more.</p>
      </div>`;
    inputEl.focus();
  }
</script>
</body>
</html>
