<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 20" role="img" aria-label="UPI">
  <title>UPI</title>
  <text x="2" y="14" fill="#16181d"
        font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="800" letter-spacing=".2"
        lengthAdjust="spacingAndGlyphs" textLength="30">UPI</text>

  <!-- Move chevrons left/right by changing translate(X, 0).
       Smaller X = closer to the text; larger X = further. -->
  <g transform="translate(33, 0)">
    <polygon points="0,6 7,10 0,14" fill="#F58220"/>
    <polygon points="7,6 14,10 7,14" fill="#2DB84D"/>
  </g>
</svg>