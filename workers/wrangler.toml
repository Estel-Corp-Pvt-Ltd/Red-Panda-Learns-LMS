name = "lms-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
FIREBASE_PROJECT_ID = "red-panda-learns-lms-dev"
ALLOWED_ORIGINS = "https://red-panda-learns-lms-dev.web.app,https://red-panda-learns-lms-dev.firebaseapp.com,http://localhost:8080"

# ─── Secrets — set each one via: wrangler secret put <NAME> ───────────────────
#
#  FIREBASE_SERVICE_ACCOUNT_JSON   Full JSON string from service account key file
#  FIREBASE_WEB_API_KEY            From Firebase Console → Project Settings → General
#  RAZORPAY_KEY_ID                 Razorpay live/test key ID
#  RAZORPAY_KEY_SECRET             Razorpay live/test key secret
#  RAZORPAY_WEBHOOK_SECRET         Razorpay webhook secret
#  BREVO_API_KEY                   Brevo (Sendinblue) API key
#  API_SECRET_TOKEN                Bearer token for internal API calls (getOrders etc.)
# ─────────────────────────────────────────────────────────────────────────────
